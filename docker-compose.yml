services:

  db:
    image: postgres:alpine
    environment:
      POSTGRES_DB: gatewaydb
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gateway -d gatewaydb" ]
      interval: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: gatewaydb
      DB_USER: gateway
      DB_PASS: gateway
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: my-very-secret-key-that-is-long-enough-32chars
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
