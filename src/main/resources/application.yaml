server:
  port: 8080

spring:
  application:
    name: shipment-tracking-gateway
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:gatewaydb}
    username: ${DB_USER:gateway}
    password: ${DB_PASS:gateway}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 300000 # 5 minutes

app:
  jwt:
    secret: ${JWT_SECRET:my-very-secret-key-that-is-long-enough-32chars}
    expiration-ms: 3600000
